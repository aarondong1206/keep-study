  :root {

    color: rgba(255,255,255,0.8);
    border: none;
    transition: all 0.2s;

  .project-tab.active { background: white; color: var(--primary); }
  .header.cet6 .project-tab.active { color: #059669; }

  .header-sub { font-size: 12px; opacity: 0.8; margin-top: 2px; }

  .total-progress-label { font-size: 12px; opacity: 0.9; }

    position: sticky;
    top: 140px;
    z-index: 90;
  }

    border-bottom: 2px solid transparent;

  .tab.active .tab-badge { background: #ede9fe; color: var(--primary); }
  .content { padding: 12px 12px 0; }

  .subject-name { font-size: 13px; font-weight: 600; flex: 1; line-height: 1.4; padding-right: 8px; }
  .subject-pct { font-size: 18px; font-weight: 700; color: var(--primary); flex-shrink: 0; }

  .stat-item { font-size: 11px; color: var(--text-muted); }
  .stat-item strong { color: var(--text); font-weight: 600; }
  .subject-bar-wrap { background: #f1f5f9; border-radius: 99px; height: 5px; overflow: hidden; }

  .section-title { font-size: 12px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; padding: 8px 0 6px; }
  .video-item { background: var(--card); border-radius: var(--radius); padding: 12px 14px; margin-bottom: 8px; box-shadow: var(--shadow); display: flex; align-items: center; gap: 12px; transition: all 0.2s; cursor: pointer; -webkit-tap-highlight-color: transparent; border: 1px solid transparent; }
  .video-item:active { transform: scale(0.98); }
  .video-item.done { background: #f0fdf4; border-color: #bbf7d0; }
  .video-check { width: 28px; height: 28px; border-radius: 50%; border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s; background: white; font-size: 14px; }
  .video-item.done .video-check { background: var(--success); border-color: var(--success); }
  .video-info { flex: 1; min-width: 0; }
  .video-episode { font-size: 13px; font-weight: 500; line-height: 1.4; word-break: break-all; }
  .video-item.done .video-episode { color: var(--text-muted); text-decoration: line-through; text-decoration-color: #86efac; }
  .video-meta { display: flex; align-items: center; gap: 8px; margin-top: 3px; flex-wrap: wrap; }
  .video-duration { font-size: 11px; color: var(--text-muted); }
  .video-subject-tag { font-size: 10px; background: #ede9fe; color: var(--primary); padding: 1px 6px; border-radius: 99px; font-weight: 500; }
  .header.cet6 .video-subject-tag { background: #d1fae5; color: var(--cet6-color); }
  .filter-bar { display: flex; gap: 8px; margin-bottom: 10px; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; padding-bottom: 2px; }

  .filter-btn { flex-shrink: 0; padding: 5px 12px; border-radius: 99px; font-size: 12px; font-weight: 500; border: 1px solid var(--border); background: var(--card); color: var(--text-muted); cursor: pointer; transition: all 0.2s; }

  .header.cet6 .filter-btn.active { background: var(--cet6-color); border-color: var(--cet6-color); }
  .search-wrap { position: relative; margin-bottom: 10px; }
  .search-input { width: 100%; padding: 9px 12px 9px 36px; border: 1px solid var(--border); border-radius: 99px; font-size: 13px; background: var(--card); color: var(--text); outline: none; }

  .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 14px; }
  .empty { text-align: center; padding: 40px 20px; color: var(--text-muted); font-size: 14px; }
  .empty-icon { font-size: 40px; margin-bottom: 8px; }

function saveState() {
  const doneIndices = [];
  videos.forEach((v, i) => { if (v.done) doneIndices.push(i); });
  localStorage.setItem(STORAGE_KEY, JSON.stringify({ doneIndices }));
}

let videos = getVideos().map((v, i) => ({ ...v, id: i }));
const savedState = loadState();
if (savedState && savedState.doneIndices) {
  savedState.doneIndices.forEach(i => { if (videos[i]) videos[i].done = true; });
}

function getSubjectStats() {
  const stats = {};
  getSubjects().forEach(s => {
    stats[s.name] = { name: s.name, short: s.short, total: 0, done: 0, totalMin: 0, doneMin: 0 };
  });
  videos.forEach(v => {
    if (stats[v.subject]) {
      stats[v.subject].total++;
      stats[v.subject].totalMin += v.durationMin;
      if (v.done) {
        stats[v.subject].done++;
        stats[v.subject].doneMin += v.durationMin;
      }
    }
  });
  return Object.values(stats);
}

function getTotalStats() {
  let total = 0, done = 0, totalMin = 0, doneMin = 0;
  videos.forEach(v => {
    total++;
    totalMin += v.durationMin;
    if (v.done) { done++; doneMin += v.durationMin; }
  });
  return { total, done, totalMin, doneMin };
}

function switchProject(project) {
  currentProject = project;
  document.querySelectorAll('.project-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + project).classList.add('active');
  
  const header = document.getElementById('mainHeader');
  if (project === 'cet6') header.classList.add('cet6');
  else header.classList.remove('cet6');
  
  document.getElementById('headerTitle').innerHTML = project === 'law' ? '⚖️ 法考学习进度' : '📚 英语六级备考';
  document.getElementById('headerSub').textContent = getProjectTitle();
  document.getElementById('progressTitle').textContent = project === 'law' ? '各科目进度' : '各模块进度';
  
  const projData = RAW_DATA[project];
  videos = projData.videos.map((v, i) => ({ ...v, id: i }));
  const saved = loadState();
  if (saved && saved.doneIndices) {
    saved.doneIndices.forEach(i => { if (videos[i]) videos[i].done = true; });
  }
  
  for (let k in subjectShortMap) delete subjectShortMap[k];
  getSubjects().forEach(s => { subjectShortMap[s.name] = s.short; });
  
  renderHeader();
  renderCurrentPage();
}

function renderCurrentPage() {
  if (currentPage === 'progress') renderProgress();
  else if (currentPage === 'plan') renderPlan();
  else if (currentPage === 'todo') renderTodo();
  else if (currentPage === 'all') renderAll();
}

function switchPage(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  document.getElementById('nav-' + page).classList.add('active');
  currentPage = page;
  renderCurrentPage();
}

function renderHeader() {
  const s = getTotalStats();
  const pct = s.total > 0 ? Math.round(s.done / s.total * 100) : 0;
  document.getElementById('totalPct').textContent = pct + '%';
  document.getElementById('totalBar').style.width = pct + '%';
  
  const unit = currentProject === 'law' ? '集' : '项';
  document.getElementById('totalEpInfo').textContent = s.done + ' / ' + s.total + ' ' + unit;
  document.getElementById('totalTimeInfo').textContent = Math.round(s.doneMin/60) + ' / ' + Math.round(s.totalMin/60) + ' 小时';
}

function renderProgress() {
  const stats = getSubjectStats();
  const container = document.getElementById('subjectList');
  container.innerHTML = stats.map(s => {
    const pct = s.total > 0 ? Math.round(s.done / s.total * 100) : 0;
    const doneH = (s.doneMin / 60).toFixed(1);
    const totalH = (s.totalMin / 60).toFixed(1);
    return `<div class="subject-card">
      <div class="subject-header">
        <div class="subject-name">${s.short}</div>
        <div class="subject-pct">${pct}%</div>
      </div>
      <div class="subject-stats">
        <div class="stat-item">${currentProject === 'law' ? '集数' : '进度'} <strong>${s.done}/${s.total}</strong></div>
        <div class="stat-item">时长 <strong>${doneH}/${totalH}h</strong></div>
      </div>
      <div class="subject-bar-wrap">
        <div class="subject-bar-fill" style="width:${pct}%"></div>
      </div>
    </div>`;
  }).join('');
}

function renderPlan() {
  const s = getTotalStats();
  const examDate = new Date(getExamDate());
  const today = new Date();
  const daysUntilExam = Math.ceil((examDate - today) / (1000 * 60 * 60 * 24));
  const pct = s.total > 0 ? Math.round(s.done / s.total * 100) : 0;
  
  let strategy = '';
  if (currentProject === 'law') {
    strategy = '<div class="alert-box"><span>💡</span><strong>核心策略：</strong>学完刑法+民法后开始刷题，减轻后期压力！</div>';
  } else {
    strategy = '<div class="alert-box"><span>💡</span><strong>核心策略：</strong>词汇语法 → 听力阅读技巧 → 真题练习 → 刷题巩固 → 模考冲刺！</div>';
  }
  
  let html = `
    <div class="countdown-box">
      <div class="countdown-label">距${currentProject === 'law' ? '2026年法考客观题' : '2026年6月六级考试'}</div>
      <div class="countdown-days">${daysUntilExam} 天</div>
      <div class="countdown-date">${examDate.toLocaleDateString('zh-CN', {month:'long', day:'numeric'})} 开考</div>
    </div>
    ${strategy}
    <div class="daily-target">
      <div class="daily-target-num">${pct}%</div>
      <div class="daily-target-label">总体完成进度</div>
      <div class="daily-target-time">${s.done} / ${s.total} ${currentProject === 'law' ? '集' : '项'} 已完成</div>
    </div>
  `;
  
  document.getElementById('planContent').innerHTML = html;
}

function renderTodo() {
  const subjects = getSubjects();
  const filterBar = document.getElementById('todoFilter');
  filterBar.innerHTML = [
    { key: 'all', label: '全部' },
    ...subjects.map(s => ({ key: s.name, label: s.short }))
  ].map(f => `<button class="filter-btn ${todoFilter === f.key ? 'active' : ''}" onclick="setTodoFilter('${f.key.replace(/'/g, "\\'")}')">${f.label}</button>`).join('');

  const todoVideos = videos.filter(v => !v.done && (todoFilter === 'all' || v.subject === todoFilter));
  const container = document.getElementById('todoList');
  if (todoVideos.length === 0) {
    container.innerHTML = '<div class="empty"><div class="empty-icon">🎉</div>没有待学内容了！</div>';
    return;
  }
  container.innerHTML = todoVideos.map(v => renderVideoItem(v, true)).join('');
}

function setTodoFilter(key) { todoFilter = key; renderTodo(); }

function renderAll() {
  const subjects = getSubjects();
  const filterBar = document.getElementById('allFilter');
  filterBar.innerHTML = [
    { key: 'all', label: '全部' },
    ...subjects.map(s => ({ key: s.name, label: s.short }))
  ].map(f => `<button class="filter-btn ${allFilter === f.key ? 'active' : ''}" onclick="setAllFilter('${f.key.replace(/'/g, "\\'")}')">${f.label}</button>`).join('');

  const query = (document.getElementById('searchInput')?.value || '').trim().toLowerCase();
  let filtered = videos.filter(v => {
    const matchSubject = allFilter === 'all' || v.subject === allFilter;
    const matchSearch = !query || v.episode.toLowerCase().includes(query) || subjectShortMap[v.subject]?.toLowerCase().includes(query);
    return matchSubject && matchSearch;
  });

  const container = document.getElementById('allList');
  if (filtered.length === 0) {
    container.innerHTML = '<div class="empty"><div class="empty-icon">🔍</div>没有找到相关内容</div>';
    return;
  }
  container.innerHTML = filtered.map(v => renderVideoItem(v, false)).join('');
}

function setAllFilter(key) { allFilter = key; renderAll(); }

function renderVideoItem(v, showSubjectTag) {
  const doneClass = v.done ? 'done' : '';
  const checkContent = v.done ? '✓' : '';
  const checkStyle = v.done ? 'color:white;font-weight:700;' : '';
  const tag = showSubjectTag ? `<span class="video-subject-tag">${subjectShortMap[v.subject] || ''}</span>` : '';
  return `<div class="video-item ${doneClass}" onclick="toggleVideo(${v.id})" id="vi-${v.id}">
    <div class="video-check" id="vc-${v.id}" style="${checkStyle}">${checkContent}</div>
    <div class="video-info">
      <div class="video-episode">${v.episode}</div>
      <div class="video-meta">
        <span class="video-duration">⏱ ${v.duration}</span>
        ${tag}
      </div>
    </div>
  </div>`;
}

function toggleVideo(id) {
  const v = videos[id];
  if (!v) return;
  v.done = !v.done;
  saveState();
  renderHeader();

  const el = document.getElementById('vi-' + id);
  const vc = document.getElementById('vc-' + id);
  if (el && vc) {
    if (v.done) {
      el.classList.add('done');
      vc.textContent = '✓';
      vc.style.color = 'white';
      vc.style.fontWeight = '700';
      vc.classList.add('pop-anim');
      setTimeout(() => vc.classList.remove('pop-anim'), 300);
      showToast('✅ 已完成！继续加油 💪');
    } else {
      el.classList.remove('done');
      vc.textContent = '';
      vc.style.color = '';
      vc.style.fontWeight = '';
      showToast('↩️ 已取消完成');
    }
    const ep = el.querySelector('.video-episode');
    if (ep) {
      ep.style.textDecoration = v.done ? 'line-through' : '';
      ep.style.color = v.done ? 'var(--text-muted)' : '';
    }
  }

  if (currentPage === 'todo' && v.done && el) {
    setTimeout(() => {
      el.style.transition = 'all 0.3s';
      el.style.opacity = '0';
      el.style.transform = 'translateX(20px)';
      setTimeout(() => renderTodo(), 350);
    }, 600);
  }

  if (currentPage === 'progress') renderProgress();
  if (currentPage === 'plan') renderPlan();
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
}

renderHeader();
renderProgress();
</script>
</body>
</html>
